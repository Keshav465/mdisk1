<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>{{ title }} — Watch & Download</title>
  <link rel="stylesheet" href="https://cdn.plyr.io/3.7.8/plyr.css"/>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet"/>
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    body{font-family:'Outfit',sans-serif;background:#0a0f1e;color:#e2e8f0;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px;
      background-image:radial-gradient(ellipse at top right,#1e1b4b 0%,transparent 60%),radial-gradient(ellipse at bottom left,#1e1b4b 0%,transparent 60%)}
    .card{width:100%;max-width:820px;background:rgba(30,41,59,0.55);backdrop-filter:blur(24px);border:1px solid rgba(255,255,255,0.08);border-radius:24px;overflow:hidden;box-shadow:0 30px 60px rgba(0,0,0,.5)}
    .top{display:flex;gap:20px;padding:24px;align-items:flex-start}
    .poster{width:110px;min-width:110px;height:160px;border-radius:12px;object-fit:cover;box-shadow:0 8px 20px rgba(0,0,0,.5)}
    .poster-placeholder{width:110px;min-width:110px;height:160px;border-radius:12px;background:rgba(255,255,255,.05);display:flex;align-items:center;justify-content:center;font-size:2.5rem}
    .info h1{font-size:1.35rem;font-weight:700;line-height:1.3;margin-bottom:8px}
    .meta{display:flex;flex-wrap:wrap;gap:10px;margin-bottom:10px}
    .tag{padding:4px 12px;border-radius:999px;font-size:.75rem;font-weight:600}
    .tag-yellow{background:rgba(245,158,11,.15);color:#f59e0b;border:1px solid rgba(245,158,11,.3)}
    .tag-blue{background:rgba(99,102,241,.15);color:#818cf8;border:1px solid rgba(99,102,241,.3)}
    .tag-gray{background:rgba(255,255,255,.06);color:#94a3b8;border:1px solid rgba(255,255,255,.1)}
    .overview{font-size:.85rem;color:#94a3b8;line-height:1.6;max-height:70px;overflow:hidden}
    .player-wrap{padding:0 24px 0;border-radius:0}
    .plyr{border-radius:14px;overflow:hidden;box-shadow:0 12px 30px rgba(0,0,0,.4)}
    .actions{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:12px;padding:20px 24px 24px}
    .btn{padding:13px 16px;border-radius:14px;text-decoration:none;font-weight:600;font-size:.88rem;display:flex;align-items:center;justify-content:center;gap:8px;transition:all .25s ease;border:none;cursor:pointer}
    .btn-primary{background:linear-gradient(135deg,#6366f1,#8b5cf6);color:white}
    .btn-primary:hover{transform:translateY(-2px);box-shadow:0 10px 25px rgba(99,102,241,.4)}
    .btn-outline{background:rgba(255,255,255,.05);color:#e2e8f0;border:1px solid rgba(255,255,255,.12)}
    .btn-outline:hover{background:rgba(255,255,255,.1);transform:translateY(-2px)}
    footer{text-align:center;padding:0 24px 20px;font-size:.75rem;color:rgba(255,255,255,.2)}
    .plyr--full-ui.plyr--video .plyr__control--overlaid{background:linear-gradient(135deg,#6366f1,#8b5cf6)}
    .plyr--video .plyr__controls{background:linear-gradient(transparent,rgba(0,0,0,.7))}
    @media(max-width:520px){.top{flex-direction:column}.poster,.poster-placeholder{width:100%;height:180px;min-width:auto}}
  </style>
</head>
<body>
<div class="card">

  <div class="top">
    {% if poster %}
      <img class="poster" src="{{ poster }}" alt="{{ title }}"/>
    {% else %}
      <div class="poster-placeholder">🎬</div>
    {% endif %}
    <div class="info">
      <h1>{{ title }}</h1>
      <div class="meta">
        {% if rating %}<span class="tag tag-yellow">⭐ {{ rating }}/10</span>{% endif %}
        {% if year %}<span class="tag tag-blue">🗓 {{ year }}</span>{% endif %}
        <span class="tag tag-gray">📦 {{ size }}</span>
      </div>
      {% if overview %}<p class="overview">{{ overview }}</p>{% endif %}
    </div>
  </div>

  <div class="player-wrap">
    <video id="player" playsinline controls>
      <source src="{{ stream_url }}" type="video/mp4"/>
    </video>
  </div>

  <div class="actions">
    <a href="{{ download_url }}" class="btn btn-primary" download>
      📥 Download
    </a>
    <a href="{{ vlc_url }}" class="btn btn-outline" target="_blank">
      🧡 Open in VLC
    </a>
    <a href="{{ mx_url }}" class="btn btn-outline" target="_blank">
      💚 MX Player
    </a>
  </div>

  <footer>Powered by SDWB2 Movie Bot · High-Speed Telegram Streaming</footer>

</div>

<script src="https://cdn.plyr.io/3.7.8/plyr.js"></script>
<script>
  new Plyr('#player', {
    displayDuration: true,
    resetOnEnd: false,
    keyboard: { focused: true, global: true },
    tooltips: { controls: true, seek: true }
  });
</script>
</body>
</html>
