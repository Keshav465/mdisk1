<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ title }} - Watch & Download</title>
    <link rel="stylesheet" href="https://cdn.plyr.io/3.7.8/plyr.css" />
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #6366f1;
            --bg: #0f172a;
            --card: rgba(30, 41, 59, 0.7);
            --text: #f1f5f9;
        }

        body {
            font-family: 'Outfit', sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background-image: radial-gradient(circle at top right, #1e1b4b, transparent), radial-gradient(circle at bottom left, #1e1b4b, transparent);
        }

        .container {
            width: 90%;
            max-width: 800px;
            background: var(--card);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 24px;
            padding: 30px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            text-align: center;
        }

        h1 {
            font-size: 1.5rem;
            margin-bottom: 5px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .metadata {
            color: #94a3b8;
            font-size: 0.9rem;
            margin-bottom: 20px;
        }

        .player-wrapper {
            border-radius: 16px;
            overflow: hidden;
            margin-bottom: 25px;
            box-shadow: 0 10px 30px -5px rgba(0, 0, 0, 0.3);
        }

        .actions {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 15px;
        }

        .btn {
            padding: 12px 20px;
            border-radius: 12px;
            text-decoration: none;
            font-weight: 600;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            font-size: 0.9rem;
        }

        .btn-primary {
            background-color: var(--primary);
            color: white;
        }

        .btn-outline {
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: var(--text);
        }

        .btn:hover {
            transform: translateY(-2px);
            filter: brightness(1.1);
        }

        .btn-primary:active {
            transform: translateY(0);
        }

        footer {
            margin-top: 30px;
            font-size: 0.8rem;
            color: rgba(255, 255, 255, 0.3);
        }

        /* Plyr overrides */
        .plyr--full-ui.plyr--video .plyr__control--overlaid {
            background: var(--primary);
        }
        .plyr--video .plyr__controls {
            background: linear-gradient(rgba(0, 0, 0, 0), rgba(0, 0, 0, 0.7));
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>{{ title }}</h1>
        <div class="metadata">Size: {{ size }} • High Speed Streaming</div>

        <div class="player-wrapper">
            <video id="player" playsinline controls data-poster="">
                <source src="{{ stream_url }}" type="video/mp4" />
            </video>
        </div>

        <div class="actions">
            <a href="{{ download_url }}" class="btn btn-primary" download>
                📥 Download Now
            </a>
            <a href="{{ vlc_url }}" class="btn btn-outline" target="_blank">
                🧡 Play in VLC
            </a>
            <a href="{{ mx_url }}" class="btn btn-outline" target="_blank">
                💚 Play in MX Player
            </a>
        </div>

        <footer>
            Streaming powered by SDWB2 Movie Bot Ecosystem
        </footer>
    </div>

    <script src="https://cdn.plyr.io/3.7.8/plyr.js"></script>
    <script>
        const player = new Plyr('#player', {
            invertTime: false,
            toggleInvert: false,
            tooltips: { controls: true, seek: true },
            displayDuration: true
        });
    </script>
</body>
</html>
