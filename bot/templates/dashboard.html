<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SDWB2 Admin Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Outfit', sans-serif; background-color: #0f172a; color: #f1f5f9; }
        .glass { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.1); }
    </style>
</head>
<body class="min-h-screen p-8">
    <div class="max-w-6xl mx-auto">
        <header class="flex justify-between items-center mb-12">
            <div>
                <h1 class="text-3xl font-semibold">Admin Dashboard</h1>
                <p class="text-slate-400">Manage your movie bot ecosystem</p>
            </div>
            <div class="flex gap-4">
                <span id="status-badge" class="px-4 py-1 rounded-full bg-emerald-500/20 text-emerald-400 border border-emerald-500/20 text-sm">System Online</span>
            </div>
        </header>

        <!-- Stats Grid -->
        <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-12">
            <div class="glass p-6 rounded-3xl">
                <h3 class="text-slate-400 text-sm mb-2">Total Users</h3>
                <div id="users-count" class="text-4xl font-bold">...</div>
            </div>
            <div class="glass p-6 rounded-3xl">
                <h3 class="text-slate-400 text-sm mb-2">Premium Groups</h3>
                <div id="groups-count" class="text-4xl font-bold">...</div>
            </div>
            <div class="glass p-6 rounded-3xl">
                <h3 class="text-slate-400 text-sm mb-2">Server Load</h3>
                <div class="text-4xl font-bold">Normal</div>
            </div>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-2 gap-8">
            <!-- Settings Card -->
            <div class="glass p-8 rounded-3xl">
                <h2 class="text-xl font-semibold mb-6">Quick Actions</h2>
                <div class="space-y-4">
                    <button class="w-full py-4 px-6 rounded-2xl bg-indigo-600 hover:bg-indigo-700 transition flex justify-between items-center">
                        <span>Broadcast Message</span>
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M13 10V3L4 14h7v7l9-11h-7z" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"/></svg>
                    </button>
                    <button class="w-full py-4 px-6 rounded-2xl bg-slate-800 hover:bg-slate-700 transition flex justify-between items-center">
                        <span>Re-index Channels</span>
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"/></svg>
                    </button>
                </div>
            </div>

            <!-- Recent Logs Placeholder -->
            <div class="glass p-8 rounded-3xl">
                <h2 class="text-xl font-semibold mb-6">Real-time Logs</h2>
                <div id="log-monitor" class="h-64 overflow-y-auto space-y-2 text-xs font-mono text-slate-400">
                    <div class="p-2 bg-slate-900/50 rounded">[SYSTEM] Bot started successfully.</div>
                    <div class="p-2 bg-slate-900/50 rounded">[SYSTEM] FastAPI Server listening on port 8080.</div>
                    <div class="p-2 bg-slate-900/50 rounded">[LOG] MongoDB Connected.</div>
                </div>
            </div>
        </div>
    </div>

    <script>
        async function fetchStats() {
            try {
                const response = await fetch('/api/stats', {
                    headers: { 'Authorization': 'Bearer ' + prompt('Enter Admin Password to load stats', 'admin') }
                });
                const data = await response.json();
                document.getElementById('users-count').innerText = data.users;
                document.getElementById('groups-count').innerText = data.groups;
            } catch (e) {
                console.error("Failed to fetch stats", e);
            }
        }
        fetchStats();
    </script>
</body>
</html>
