<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SDWB2 Admin Dashboard</title>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    body{font-family:'Outfit',sans-serif;background:#0a0f1e;color:#e2e8f0;min-height:100vh;padding:30px}
    .glass{background:rgba(30,41,59,0.6);backdrop-filter:blur(20px);border:1px solid rgba(255,255,255,0.08);border-radius:20px}
    h1{font-size:2rem;font-weight:700;background:linear-gradient(135deg,#6366f1,#8b5cf6);-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:6px}
    .subtitle{color:#64748b;margin-bottom:36px;font-size:.95rem}
    .grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:20px;margin-bottom:30px}
    .stat-card{padding:28px 24px}
    .stat-label{font-size:.8rem;color:#64748b;text-transform:uppercase;letter-spacing:.1em;margin-bottom:10px}
    .stat-value{font-size:2.5rem;font-weight:700;color:#f1f5f9}
    .stat-icon{font-size:1.8rem;margin-bottom:10px}
    .badge{display:inline-block;padding:4px 12px;border-radius:999px;font-size:.75rem;font-weight:600}
    .badge-green{background:rgba(16,185,129,.15);color:#10b981;border:1px solid rgba(16,185,129,.3)}
    .section{padding:28px;margin-bottom:20px}
    .section h2{font-size:1.1rem;font-weight:600;margin-bottom:20px;display:flex;align-items:center;gap:8px}
    .btn{padding:12px 22px;border-radius:12px;border:none;cursor:pointer;font-family:'Outfit',sans-serif;font-size:.9rem;font-weight:600;transition:all .2s ease;display:inline-flex;align-items:center;gap:8px}
    .btn-primary{background:linear-gradient(135deg,#6366f1,#8b5cf6);color:white}
    .btn-primary:hover{transform:translateY(-2px);box-shadow:0 8px 25px rgba(99,102,241,.4)}
    .btn-outline{background:transparent;color:#e2e8f0;border:1px solid rgba(255,255,255,.15)}
    .btn-outline:hover{background:rgba(255,255,255,.05);transform:translateY(-2px)}
    textarea{width:100%;background:rgba(15,23,42,.8);border:1px solid rgba(255,255,255,.1);border-radius:12px;color:#e2e8f0;padding:14px;font-family:'Outfit',sans-serif;font-size:.9rem;resize:vertical;margin-bottom:12px}
    .log-box{height:200px;overflow-y:auto;background:rgba(15,23,42,.8);border-radius:12px;padding:14px;font-family:'Courier New',monospace;font-size:.78rem;color:#94a3b8}
    .log-entry{padding:4px 0;border-bottom:1px solid rgba(255,255,255,.04)}
    .flex{display:flex;gap:12px;flex-wrap:wrap}
    input[type=password]{width:100%;background:rgba(15,23,42,.8);border:1px solid rgba(255,255,255,.1);border-radius:12px;color:#e2e8f0;padding:12px 16px;font-family:'Outfit',sans-serif;font-size:.9rem;margin-bottom:12px}
    #login-modal{position:fixed;inset:0;background:rgba(10,15,30,.95);display:flex;align-items:center;justify-content:center;z-index:100}
    .modal-card{padding:40px;max-width:380px;width:100%}
    .modal-card h2{margin-bottom:20px;text-align:center}
    #app{display:none}
    .alert{padding:12px 16px;border-radius:10px;margin-bottom:16px;font-size:.85rem}
    .alert-red{background:rgba(239,68,68,.15);color:#ef4444;border:1px solid rgba(239,68,68,.3)}
    .alert-green{background:rgba(16,185,129,.15);color:#10b981;border:1px solid rgba(16,185,129,.3)}
  </style>
</head>
<body>

<!-- Login Modal -->
<div id="login-modal">
  <div class="glass modal-card">
    <h2>🔐 Admin Login</h2>
    <div id="login-error" class="alert alert-red" style="display:none">Wrong password</div>
    <input type="password" id="pwd-input" placeholder="Enter admin password" />
    <button class="btn btn-primary" style="width:100%;justify-content:center" onclick="login()">Login →</button>
  </div>
</div>

<!-- Main Dashboard -->
<div id="app">
  <h1>🎬 SDWB2 Dashboard</h1>
  <p class="subtitle">Manage your movie bot ecosystem · <span class="badge badge-green">● Online</span></p>

  <!-- Stats -->
  <div class="grid">
    <div class="glass stat-card">
      <div class="stat-icon">👥</div>
      <div class="stat-label">Total Users</div>
      <div class="stat-value" id="users-count">—</div>
    </div>
    <div class="glass stat-card">
      <div class="stat-icon">🏆</div>
      <div class="stat-label">Premium Groups</div>
      <div class="stat-value" id="groups-count">—</div>
    </div>
    <div class="glass stat-card">
      <div class="stat-icon">⚡</div>
      <div class="stat-label">Server</div>
      <div class="stat-value" style="font-size:1.4rem">Running</div>
    </div>
  </div>

  <!-- Broadcast -->
  <div class="glass section">
    <h2>📢 Broadcast Message</h2>
    <div id="broadcast-result" style="display:none;margin-bottom:12px"></div>
    <textarea id="broadcast-text" rows="4" placeholder="Type your message here..."></textarea>
    <div class="flex">
      <button class="btn btn-primary" onclick="sendBroadcast()">🚀 Send to All Users</button>
      <button class="btn btn-outline" onclick="clearBroadcast()">Clear</button>
    </div>
  </div>

  <!-- Logs -->
  <div class="glass section">
    <h2>📋 Activity Log</h2>
    <div class="log-box" id="log-box">
      <div class="log-entry">[SYSTEM] Dashboard loaded.</div>
    </div>
  </div>
</div>

<script>
  let AUTH_TOKEN = '';

  function login() {
    const pwd = document.getElementById('pwd-input').value;
    if (!pwd) return;
    AUTH_TOKEN = pwd;
    fetchStats();
  }

  async function fetchStats() {
    try {
      const res = await fetch('/api/stats', {
        headers: { 'Authorization': 'Bearer ' + AUTH_TOKEN }
      });
      if (res.status === 401) {
        document.getElementById('login-error').style.display = 'block';
        return;
      }
      const data = await res.json();
      document.getElementById('users-count').innerText = data.users.toLocaleString();
      document.getElementById('groups-count').innerText = data.groups.toLocaleString();
      document.getElementById('login-modal').style.display = 'none';
      document.getElementById('app').style.display = 'block';
      addLog('[STATS] Loaded: ' + data.users + ' users, ' + data.groups + ' groups.');
    } catch(e) {
      document.getElementById('login-error').style.display = 'block';
      document.getElementById('login-error').innerText = 'Connection error: ' + e;
    }
  }

  async function sendBroadcast() {
    const text = document.getElementById('broadcast-text').value.trim();
    if (!text) return alert('Please enter a message.');
    const resultDiv = document.getElementById('broadcast-result');
    resultDiv.className = 'alert alert-green';
    resultDiv.innerText = '⏳ Sending...';
    resultDiv.style.display = 'block';

    const res = await fetch('/api/broadcast', {
      method: 'POST',
      headers: { 'Authorization': 'Bearer ' + AUTH_TOKEN, 'Content-Type': 'application/json' },
      body: JSON.stringify({ text })
    });
    const data = await res.json();
    resultDiv.innerText = `✅ Sent: ${data.sent} | Failed: ${data.failed}`;
    addLog('[BROADCAST] Sent:' + data.sent + ' Failed:' + data.failed);
  }

  function clearBroadcast() {
    document.getElementById('broadcast-text').value = '';
    document.getElementById('broadcast-result').style.display = 'none';
  }

  function addLog(msg) {
    const box = document.getElementById('log-box');
    const el = document.createElement('div');
    el.className = 'log-entry';
    el.innerText = '[' + new Date().toLocaleTimeString() + '] ' + msg;
    box.prepend(el);
  }
</script>
</body>
</html>
